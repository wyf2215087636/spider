spring:
  application:
    name: api-gateway
  messages:
    basename: messages
    encoding: UTF-8
  datasource:
    url: ${DB_URL:jdbc:postgresql://8.159.154.179:5432/spider}
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:mypassword}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

mybatis-plus:
  type-handlers-package: com.spider.apigateway.config
  configuration:
    map-underscore-to-camel-case: true

spider:
  llm:
    enabled: ${LLM_ENABLED:true}
    provider: ${LLM_PROVIDER:deepseek}
    base-url: ${LLM_BASE_URL:https://api.deepseek.com}
    api-key: ${LLM_API_KEY:sk-6cb943b2615a4f43831ffd082e0467d2}
    model: ${LLM_MODEL:deepseek-chat}
    temperature: ${LLM_TEMPERATURE:0.2}
    timeout-seconds: ${LLM_TIMEOUT_SECONDS:45}
