spring:
  application:
    name: api-gateway
  messages:
    basename: messages
    encoding: UTF-8
  datasource:
    url: ${DB_URL:jdbc:postgresql://8.159.154.179:5432/spider}
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:mypassword}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

mybatis-plus:
  type-handlers-package: com.spider.apigateway.config
  configuration:
    map-underscore-to-camel-case: true
