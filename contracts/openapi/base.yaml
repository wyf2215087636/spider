openapi: 3.0.3
info:
  title: Spider API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/health:
    get:
      summary: Health check
      parameters:
        - in: header
          name: Accept-Language
          required: false
          schema:
            type: string
            example: zh-CN
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseHealth"

  /api/v1/auth/login:
    post:
      summary: Login by username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseLogin"

  /api/v1/auth/me:
    get:
      summary: Get current authenticated user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUserProfile"

  /api/v1/auth/logout:
    post:
      summary: Logout current user
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"

  /api/v1/workspaces:
    get:
      summary: List workspaces
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseWorkspaceList"
    post:
      summary: Create workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "200":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseWorkspace"

  /api/v1/workspaces/{workspaceId}:
    get:
      summary: Get workspace detail
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseWorkspace"
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    put:
      summary: Update workspace
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseWorkspace"
    delete:
      summary: Delete workspace
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDelete"

  /api/v1/projects:
    get:
      summary: List projects
      parameters:
        - in: query
          name: workspaceId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProjectList"
    post:
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "200":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProject"

  /api/v1/projects/{projectId}:
    get:
      summary: Get project detail
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProject"
    put:
      summary: Update project
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProject"
    delete:
      summary: Delete project
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Project deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDelete"

  /api/v1/product-docs:
    get:
      summary: List product documents
      parameters:
        - in: query
          name: projectId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product document list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocList"
    post:
      summary: Create product document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductDocRequest"
      responses:
        "200":
          description: Product document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocDetail"

  /api/v1/product-docs/{docId}:
    get:
      summary: Get product document detail
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product document detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocDetail"
    put:
      summary: Update product document draft
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductDocRequest"
      responses:
        "200":
          description: Product document updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocDetail"

  /api/v1/product-docs/{docId}/publish-version:
    post:
      summary: Publish a new immutable product document version from current draft
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishProductDocVersionRequest"
      responses:
        "200":
          description: Product document version published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocDetail"

  /api/v1/product-docs/{docId}/versions:
    get:
      summary: List product document versions
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product document version list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocVersionList"

  /api/v1/product-docs/{docId}/versions/{versionId}:
    get:
      summary: Get product document version detail
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: versionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product document version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocVersion"

  /api/v1/product-docs/{docId}/rollback:
    post:
      summary: Roll back to an existing version and publish as a new version
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollbackProductDocRequest"
      responses:
        "200":
          description: Product document rolled back
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocDetail"

  /api/v1/product-docs/{docId}/ai-chat/messages:
    get:
      summary: List product document AI chat messages
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product document AI chat messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocAiMessageList"
    post:
      summary: Send an AI instruction message for product document revision
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductDocAiMessageRequest"
      responses:
        "200":
          description: AI revision candidate generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocAiGenerate"

  /api/v1/product-docs/{docId}/ai-chat/messages/stream:
    post:
      summary: Stream AI revision for current product document draft
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductDocAiMessageRequest"
      responses:
        "200":
          description: Server-Sent Events stream, emits `delta` and `done` events
          content:
            text/event-stream:
              schema:
                type: string

  /api/v1/product-docs/{docId}/ai-revisions:
    get:
      summary: List product document AI revision candidates
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pending, confirmed, rejected]
      responses:
        "200":
          description: Product document AI revision list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocRevisionList"

  /api/v1/product-docs/{docId}/ai-revisions/{revisionId}/confirm:
    post:
      summary: Confirm AI revision and publish as a new product document version
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: revisionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmProductDocRevisionRequest"
      responses:
        "200":
          description: AI revision confirmed and version published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocDetail"

  /api/v1/product-docs/{docId}/ai-revisions/{revisionId}/reject:
    post:
      summary: Reject AI revision candidate
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: revisionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectProductDocRevisionRequest"
      responses:
        "200":
          description: AI revision rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductDocRevision"

  /api/v1/chat-sessions:
    get:
      summary: List current actor chat sessions
      parameters:
        - in: query
          name: projectId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: role
          required: false
          schema:
            type: string
            enum: [product, backend, frontend, test]
      responses:
        "200":
          description: Chat session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseChatSessionList"
    post:
      summary: Create private chat session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatSessionRequest"
      responses:
        "200":
          description: Chat session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseChatSession"

  /api/v1/chat-sessions/{sessionId}/publish:
    post:
      summary: Create requirement package draft from private chat session
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRequirementHandoffRequest"
      responses:
        "200":
          description: Requirement handoff published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRequirementHandoff"

  /api/v1/chat-sessions/{sessionId}/messages:
    get:
      summary: List private chat messages for selected session
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Chat message list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseChatMessageList"
    post:
      summary: Send a message to chat session and get AI reply
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatMessageRequest"
      responses:
        "200":
          description: AI reply message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseChatMessage"

  /api/v1/chat-sessions/{sessionId}/ai-draft:
    post:
      summary: Generate AI draft handoff package from session context and code impact analysis
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAiDraftRequest"
      responses:
        "200":
          description: AI draft package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseAiDraft"

  /api/v1/requirement-handoffs:
    get:
      summary: List published requirement handoffs
      parameters:
        - in: query
          name: projectId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: targetRole
          required: false
          schema:
            type: string
            enum: [product, backend, frontend, test]
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [draft, in_review, published, accepted, in_development, in_testing, done, rejected]
      responses:
        "200":
          description: Requirement handoff list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRequirementHandoffList"

  /api/v1/requirement-handoffs/{handoffId}/accept:
    post:
      summary: Accept a published requirement handoff
      parameters:
        - in: path
          name: handoffId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Requirement handoff accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRequirementHandoff"

  /api/v1/requirement-handoffs/{handoffId}/transition:
    post:
      summary: Transition requirement handoff state
      parameters:
        - in: path
          name: handoffId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransitionRequirementHandoffRequest"
      responses:
        "200":
          description: Requirement handoff transitioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRequirementHandoff"

  /api/v1/requirement-handoffs/{handoffId}/tasks/ai-generate:
    post:
      summary: Generate role task plan by AI for requirement handoff
      parameters:
        - in: path
          name: handoffId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: AI task plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseAiTaskPlan"

  /api/v1/requirement-handoffs/{handoffId}/tasks:
    get:
      summary: List requirement tasks under handoff
      parameters:
        - in: path
          name: handoffId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Requirement task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRequirementTaskList"

  /api/v1/requirement-handoffs/tasks/{taskId}/claim:
    post:
      summary: Claim requirement task to current actor
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Requirement task claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRequirementTask"

  /api/v1/requirement-handoffs/tasks/{taskId}/status:
    put:
      summary: Update requirement task status
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRequirementTaskStatusRequest"
      responses:
        "200":
          description: Requirement task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRequirementTask"

  /api/v1/tasks:
    get:
      summary: List tasks for task center views
      parameters:
        - in: query
          name: view
          required: false
          schema:
            type: string
            enum: [pool, mine, all]
            default: pool
        - in: query
          name: projectId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [todo, in_progress, done, blocked]
        - in: query
          name: role
          required: false
          schema:
            type: string
            enum: [product, backend, frontend, test]
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: Task center page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseTaskCenterPage"
  /api/v1/tasks/{taskId}:
    get:
      summary: Get task detail with requirement handoff context
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Requirement task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRequirementTaskDetail"

  /api/v1/audit-logs:
    get:
      summary: List audit logs
      parameters:
        - in: query
          name: resourceType
          required: false
          schema:
            type: string
            example: workspace
        - in: query
          name: resourceId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            example: 50
      responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseAuditLogList"

  /api/v1/audit-logs/workspace-options:
    get:
      summary: List workspace audit filter options
      responses:
        "200":
          description: Workspace filter option list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseWorkspaceAuditFilterList"

  /api/v1/audit-logs/project-options:
    get:
      summary: List project audit filter options
      responses:
        "200":
          description: Project filter option list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProjectAuditFilterList"

components:
  schemas:
    ApiResponseHealth:
      type: object
      properties:
        code:
          type: string
          example: "0"
        message:
          type: string
          example: OK
        data:
          $ref: "#/components/schemas/HealthData"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseLogin:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/LoginData"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseUserProfile:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/UserProfile"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseString:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          type: string
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseWorkspace:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/Workspace"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseProject:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/Project"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseProductDoc:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/ProductDoc"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseProductDocDetail:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/ProductDocDetail"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseProductDocVersion:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/ProductDocVersion"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseChatSession:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/ChatSession"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseRequirementHandoff:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/RequirementHandoff"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseChatMessage:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/ChatMessage"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseAiDraft:
