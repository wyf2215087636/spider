openapi: 3.0.3
info:
  title: Spider API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/health:
    get:
      summary: Health check
      parameters:
        - in: header
          name: Accept-Language
          required: false
          schema:
            type: string
            example: zh-CN
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseHealth"

  /api/v1/workspaces:
    get:
      summary: List workspaces
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseWorkspaceList"
    post:
      summary: Create workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "200":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseWorkspace"

  /api/v1/workspaces/{workspaceId}:
    get:
      summary: Get workspace detail
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseWorkspace"
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    put:
      summary: Update workspace
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseWorkspace"
    delete:
      summary: Delete workspace
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDelete"

  /api/v1/audit-logs:
    get:
      summary: List audit logs
      parameters:
        - in: query
          name: resourceType
          required: false
          schema:
            type: string
            example: workspace
        - in: query
          name: resourceId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            example: 50
      responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseAuditLogList"

components:
  schemas:
    ApiResponseHealth:
      type: object
      properties:
        code:
          type: string
          example: "0"
        message:
          type: string
          example: OK
        data:
          $ref: "#/components/schemas/HealthData"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseWorkspace:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/Workspace"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseWorkspaceList:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/Workspace"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseDelete:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          type: object
          additionalProperties:
            type: string
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiResponseAuditLogList:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ApiErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: WORKSPACE_NOT_FOUND
        message:
          type: string
        data:
          nullable: true
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    HealthData:
      type: object
      properties:
        status:
          type: string
          example: UP
        serverTime:
          type: string
          format: date-time
        message:
          type: string

    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        owner:
          type: string
        status:
          type: string
        defaultLanguage:
          type: string
          enum: [zh-CN, en-US]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        requestId:
          type: string
        actor:
          type: string
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        status:
          type: string
        details:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateWorkspaceRequest:
      type: object
      required: [name, owner]
      properties:
        name:
          type: string
        owner:
          type: string
        defaultLanguage:
          type: string
          enum: [zh-CN, en-US]
          default: zh-CN

    UpdateWorkspaceRequest:
      type: object
      required: [name, owner, status, defaultLanguage]
      properties:
        name:
          type: string
        owner:
          type: string
        status:
          type: string
        defaultLanguage:
          type: string
          enum: [zh-CN, en-US]
